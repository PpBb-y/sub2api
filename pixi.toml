[workspace]
name = "sub2api"
channels = ["conda-forge"]
platforms = ["linux-64", "win-64"]
version = "0.1.0"

[dependencies]
nodejs = "24.*"           # LTS 版本，保持稳定
go = "1.25.*"             # 项目要求 Go 1.25.7
pnpm = ">=10.30,<11"      # 最新 10.x 系列
gcc = ">=15.2.0,<16"      # GCC 15.x 系列
lefthook = ">=2.1.1,<3"   # Git hooks 管理器
