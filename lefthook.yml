# Lefthook configuration for sub2api
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    # Frontend React: lint + typecheck
    frontend-react-check:
      glob: "frontend-react/**/*.{ts,tsx}"
      run: just check-react

    # Backend Go: format check + lint
    backend-go:
      glob: "backend/**/*.go"
      run: just precommit-go
